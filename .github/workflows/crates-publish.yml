name: Publish to crates.io

# Runs alongside the cargo-dist `Release` workflow.
# Kept separate because `.github/workflows/release.yml` is regenerated by
# cargo-dist (`dist init`) and any edits there will be overwritten.

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # Allow tag formats like "1.0.0", "v1.0.0", or "concord-v1.0.0".
          TAG_VERSION="${TAG##*v}"
          TAG_VERSION="${TAG_VERSION##*-}"
          PKG_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "concord") | .version')
          echo "tag=$TAG tag_version=$TAG_VERSION pkg_version=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($PKG_VERSION)."
            exit 1
          fi

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
